backend:
  name: git-gateway
  branch: main

locale: ko
media_folder: static/uploads
public_folder: /static/uploads

collections:
  - name: news
    label: 소식·공지
    folder: content/news
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: 제목, name: title, widget: string }
      - { label: 분류, name: cat, widget: select, options: [공지, 보도, 활동, 교육] }
      - { label: 공지 상단고정, name: isNotice, widget: boolean, default: false }
      - { label: 내용, name: body, widget: markdown }

  - name: health
    label: 건강정보
    folder: content/health
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: 제목, name: title, widget: string }
      - { label: 카테고리, name: cat, widget: select, options: [올바른 약 사용, 노인 건강, 어린이 건강] }
      - { label: 아이콘(이모지), name: icon, widget: string, default: "💊" }
      - { label: 요약, name: excerpt, widget: string }
      - { label: 썸네일 이미지, name: image, widget: image, required: false }
      - { label: 본문, name: body, widget: markdown }

  - name: media
    label: 약사회 미디어
    folder: content/media
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: 제목, name: title, widget: string }
      - { label: 유형, name: type, widget: select, options: [cardnews, poster, shorts] }
      - { label: 아이콘(이모지), name: icon, widget: string, default: "📋" }
      - { label: 배경색, name: color, widget: string, default: "#002D62" }
      - { label: 썸네일 이미지, name: image, widget: image, required: false }
      - { label: 링크 URL, name: url, widget: string, required: false }

  - name: issues
    label: 핵심 현안
    folder: content/issues
    create: true
    slug: "{{slug}}"
    fields:
      - { label: 제목, name: title, widget: string }
      - { label: 아이콘, name: icon, widget: string, default: "📌" }
      - { label: 상태, name: status, widget: select, options: ["🔴 긴급 대응 중","🔴 강력 반대","🟡 검토 중","🔵 논의 중","✅ 완료"] }
      - { label: 부제, name: subtitle, widget: string }
      - { label: 배경색1, name: color1, widget: string, default: "#002D62" }
      - { label: 배경색2, name: color2, widget: string, default: "#4A9FD4" }
      - { label: 문제 설명, name: problem, widget: markdown }
      - { label: 공식 입장, name: position, widget: markdown }
      - { label: 대응 활동(쉼표구분), name: actions, widget: string }

  - name: settings
    label: 사이트 설정
    files:
      - label: 회장 프로필
        name: president
        file: content/settings/president.json
        fields:
          - { label: "배지(예: 제34대 회장)", name: badge, widget: string }
          - { label: 이름, name: name, widget: string }
          - { label: 직함, name: title, widget: string }
          - { label: 취임일, name: inaug, widget: string }
          - { label: 소속 약국, name: org, widget: string }
          - { label: 학력, name: edu, widget: string }
          - { label: 경력, name: career, widget: string }
          - { label: 연락처, name: contact, widget: string }
      - label: 기관 연락처
        name: contact
        file: content/settings/contact.json
        fields:
          - { label: 주소, name: address, widget: string }
          - { label: 전화, name: tel, widget: string }
          - { label: 팩스, name: fax, widget: string }
          - { label: 이메일, name: email, widget: string }
          - { label: 업무시간, name: hours, widget: string }
